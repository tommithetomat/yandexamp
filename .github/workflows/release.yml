name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Builds the current platform's target (NSIS on Windows, DMG on macOS)
      # and uploads artifacts to the GitHub release for this tag
      - run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS: skip code signing (no Apple Developer certificate)
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
