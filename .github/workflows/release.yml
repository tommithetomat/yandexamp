name: Build & Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Build only — publishing from two jobs creates duplicate draft releases
      - run: npx electron-builder --publish never
        env:
          # macOS: skip code signing (no Apple Developer certificate)
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
          if-no-files-found: error

  # Single job publishes ONE release with just the installers
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: installers

      - uses: softprops/action-gh-release@v2
        with:
          files: installers/*
